services:
  - type: web
    name: parijs-site-v010
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGSSL
        value: "true"
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 2
